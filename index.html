<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionnaire de Budget</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Gestionnaire de budget</h1>
    </header>

    <main class="container">
        <section class="summary" aria-label="Résumé du budget">
            <div class="card">
                <p>Revenus</p>
                <span id="total-revenus">0 $</span>
            </div>
            <div class="card">
                <p>Dépenses</p>
                <span id="total-depenses">0 $</span>
            </div>
            <div class="card">
                <p>Solde</p>
                <span id="total-solde">0 $</span>
            </div>
        </section>

        <section class="form-section">
            <h2>Ajouter une transaction</h2>
            <form id="budget-form">
                <div class="input-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" placeholder="Ex: Salaire, Loyer..." required>
                </div>
                
                <div class="input-group">
                    <label for="amount">Montant</label>
                    <input type="number" id="amount" step="0.01" min="0.01" placeholder="0.00" required>
                </div>

                <div class="input-group">
                    <label for="type">Type</label>
                    <select id="type" required>
                        <option value="">Choisir un type</option>
                        <option value="revenu">Revenu</option>
                        <option value="depense">Dépense</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="category">Catégorie</label>
                    <select id="category" required>
                        <option value="Autre">Autre</option>
                        <option value="Logement">Logement</option>
                        <option value="Alimentation">Alimentation</option>
                        <option value="Transport">Transport</option>
                    </select>
                </div>

                <button type="submit" id="add-btn">Ajouter</button>
            </form>
        </section>

        <section class="transactions-section">
            <h2>Transactions</h2>
            <div id="transactions-list">
                </div>

            <div class="file-actions">
                <button id="download-btn" class="btn-secondary">Télécharger le budget (JSON)</button>
                <div class="import-group">
                    <input type="file" id="import-file" accept=".json">
                    <button id="import-btn" class="btn-secondary">Importer un fichier JSON</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>TP1 – Une solution parmis tant d'autres</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
